stages:
  - sync

github_community_sync:
  stage: sync
  image: alpine:latest
  only:
    - main
  before_script:
    - apk add --no-cache git openssh
    - git config --global user.name "GitLab CI Bot"
    - git config --global user.email "ci-bot@sessiondb.com"
  script:
    # 1. Prepare the scrubbed branch
    - git checkout -b github-sync-temp
    
    # 2. Apply Community-only rules
    - mv .gitignore.community .gitignore
        
    # 3. Scrub Pro Backend logic
    - rm -rf internal/premium/
    
    # 4. Scrub Pro Frontend logic
    - rm -rf src/features/Premium/

    # 5. Remove GitLab CI configuration
    - rm -f .gitlab-ci.yml
    
    # 6. Stage all deletions and changes
    - git add .
    
    # 7. Commit changes (using single quotes for colon safety)
    - 'git commit -m "chore: sync community edition [skip ci]" || echo "No changes to sync"'
    
    # 8. Push to GitHub (Using the x-access-token fix)
    - git push --force https://x-access-token:${GH_TOKEN}@github.com/SaimouliBandari/sessiondb-ui.git github-sync-temp:main