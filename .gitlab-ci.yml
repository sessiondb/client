stages:
  - sync
  - publish

# 1. ALWAYS SYNC TO GITHUB (On every push to main)
github_community_sync:
  stage: sync
  image: alpine:latest
  variables:
    GIT_DEPTH: 0  # full clone so push to GitHub has all objects (avoids "did not receive expected object")
  only:
    - main
  before_script:
    - apk add --no-cache git openssh
    - git config --global user.name "GitLab CI Bot"
    - git config --global user.email "ci-bot@sessiondb.com"
  script:
    - git checkout -b github-sync-temp
    - mv .gitignore.community .gitignore
    - rm -rf internal/premium/ src/features/Premium/ .gitlab-ci.yml docs/plans docs/features
    - git add .
    - git commit -m "[chore] sync community edition [skip ci]" || echo "No changes to sync"
    - git push --force https://x-access-token:${GH_TOKEN}@github.com/sessiondb/client.git github-sync-temp:main

# 2. PUBLISH TO DOCKER (ONLY when you push a Git Tag)
publish_community_docker:
  stage: publish
  image: docker:latest
  services:
    - docker:dind
  variables:
    GIT_DEPTH: 0  # full clone so push to GitHub has all objects
  only:
    - tags
  before_script:
    # 1. Install Git, OpenSSH, GitHub CLI, and Node (for release artifacts)
    - apk add --no-cache git openssh github-cli nodejs npm
    - git config --global user.name "GitLab CI Bot"
    - git config --global user.email "ci-bot@sessiondb.com"
    - echo "$DOCKER_HUB_TOKEN" | docker login -u "$DOCKER_HUB_USER" --password-stdin
  script:
    # --- STEP 1: PREPARE SCRUBBED CODE ---
    - git checkout -b docker-build-temp
    - mv .gitignore.community .gitignore
    - rm -rf internal/premium/ src/features/Premium/ .gitlab-ci.yml docs/plans docs/features
    - git add .
    - 'git commit -m "chore: sync community edition $CI_COMMIT_TAG [skip ci]" || echo "No changes"'

    # --- STEP 2: SYNC TAG TO GITHUB ---
    # We push the tag to GitHub so it appears in their 'Tags' list
    - git push --force https://x-access-token:${GH_TOKEN}@github.com/sessiondb/client.git docker-build-temp:$CI_COMMIT_TAG
    
    # --- STEP 3: CREATE GITHUB RELEASE ---
    - export GITHUB_TOKEN=$GH_TOKEN
    - 'gh release create $CI_COMMIT_TAG --repo sessiondb/client --title "SessionDB UI $CI_COMMIT_TAG" --notes "Community Edition. Docker Image: $DOCKER_HUB_USER/sessiondb-ui:$CI_COMMIT_TAG"'
    # --- STEP 4: BUILD RELEASE ARTIFACTS (frontend tar.gz + checksum) AND UPLOAD ---
    - npm ci
    - npm run build
    - tar czf sessiondb-frontend-build.tar.gz dist
    - sha256sum sessiondb-frontend-build.tar.gz > checksums-frontend.txt
    - gh release upload $CI_COMMIT_TAG sessiondb-frontend-build.tar.gz checksums-frontend.txt --repo sessiondb/client
    # --- STEP 5: DOCKER BUILD & PUSH ---
    - export IMAGE_TAG=$CI_COMMIT_TAG
    - docker build -t $DOCKER_HUB_USER/sessiondb-ui:$IMAGE_TAG .
    - docker tag $DOCKER_HUB_USER/sessiondb-ui:$IMAGE_TAG $DOCKER_HUB_USER/sessiondb-ui:latest
    - docker push $DOCKER_HUB_USER/sessiondb-ui:$IMAGE_TAG
    - docker push $DOCKER_HUB_USER/sessiondb-ui:latest